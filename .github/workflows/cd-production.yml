name: CD - Deploy to Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: cd-production
  cancel-in-progress: false

jobs:
  gate:
    name: Release Gate
    runs-on: ubuntu-22.04
    steps:
      - name: Confirm tag format
        run: |
          echo "Releasing ${{ github.ref_name }}"
          [[ "${{ github.ref_name }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]] || \
            { echo "Tag must be semver (vX.Y.Z)"; exit 1; }

  build_and_push:
    name: Build & Push Release Images
    needs: gate
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend (release tag only)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/core-banking-backend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

      - name: Build & push frontend (release tag only)
        uses: docker/build-push-action@v5
        with:
          context: apps/cb_dashboard
          file: apps/cb_dashboard/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/core-banking-frontend:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_SHA=${{ github.sha }}

  deploy_production:
    name: Deploy to Production
    needs: build_and_push
    runs-on: ubuntu-22.04
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/core-banking

            export IMAGE_TAG=${{ github.ref_name }}
            docker compose pull

            docker compose up -d --no-deps backend
            sleep 15

            STATUS=$(curl -sf http://localhost:8080/health | jq -r '.status')
            [ "$STATUS" = "ok" ] || { echo "Backend unhealthy after update"; exit 1; }

            docker compose up -d --no-deps frontend

            echo "Production deploy complete - $IMAGE_TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

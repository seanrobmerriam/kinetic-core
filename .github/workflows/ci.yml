name: CI Quality Gate

# ─── Triggers ─────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  OTP_VERSION: '25.3'
  REBAR3_VERSION: '3.24.0'
  NODE_VERSION: '20'

# ─── Jobs ─────────────────────────────────────────────────────────────────────
jobs:

  # ── 1. Erlang backend ───────────────────────────────────────────────────────
  erlang:
    name: Erlang — compile / test / dialyze / property
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Cache rebar3 build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: rebar3-${{ runner.os }}-otp${{ env.OTP_VERSION }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
          restore-keys: |
            rebar3-${{ runner.os }}-otp${{ env.OTP_VERSION }}-

      - name: Compile
        run: rebar3 compile

      - name: Common Test
        run: rebar3 ct

      - name: Upload CT logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ct-logs
          path: _build/test/logs/

      - name: Dialyzer
        run: rebar3 dialyzer

      - name: PropEr (50 runs per property)
        run: rebar3 proper --numtests 50

  # ── 2. Dashboard ────────────────────────────────────────────────────────────
  dashboard:
    name: Dashboard — lint / build / unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/cb_dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/cb_dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests

  # ── 3. Mutation testing ─────────────────────────────────────────────────────
  mutation:
    name: Mutation Testing — kill rate ≥ 70%
    runs-on: ubuntu-latest
    needs: erlang
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: rebar3-${{ runner.os }}-otp${{ env.OTP_VERSION }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
          restore-keys: |
            rebar3-${{ runner.os }}-otp${{ env.OTP_VERSION }}-

      - name: Warm-up compile
        run: rebar3 compile

      - name: Run mutation tests
        env:
          MUTATION_STRICT: '1'
          MUTATION_THRESHOLD: '0.70'
        run: node test/mutation-test.js

  # ── 4. Integration / contract tests ─────────────────────────────────────────
  integration:
    name: Integration — contract tests
    runs-on: ubuntu-latest
    needs: erlang
    steps:
      - uses: actions/checkout@v4

      - name: Set up Erlang/OTP + rebar3
        uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ env.OTP_VERSION }}
          rebar3-version: ${{ env.REBAR3_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Restore rebar3 cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/rebar3
            _build
          key: rebar3-${{ runner.os }}-otp${{ env.OTP_VERSION }}-${{ hashFiles('rebar.config', 'rebar.lock') }}
          restore-keys: |
            rebar3-${{ runner.os }}-otp${{ env.OTP_VERSION }}-

      - name: Build release
        run: rebar3 release

      - name: Start API server
        run: |
          _build/default/rel/ironledger/bin/ironledger foreground &
          echo "Waiting for API to become healthy..."
          for i in $(seq 1 30); do
            curl -sf http://localhost:8081/health && { echo "API is up (attempt $i)."; break; } || sleep 2
          done

      - name: Run contract tests
        env:
          API_URL: http://localhost:8081
          DASHBOARD_AUTH_EMAIL: admin@example.com
          DASHBOARD_AUTH_PASSWORD: secret-pass
        run: node test/contracts.js

      - name: Stop API server
        if: always()
        run: pkill -f "ironledger foreground" || true

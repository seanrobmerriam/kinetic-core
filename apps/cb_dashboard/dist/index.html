<!doctype html>
<html lang="en" data-theme="light">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>IronLedger Dashboard</title>
        <link rel="stylesheet" href="fonts.css" />
        <style>
            /* CSS Custom Properties - Design Tokens */
            :root {
                /* Colors - Light Theme */
                --color-bg: #f1f5f9;
                --color-surface: #ffffff;
                --color-surface-elevated: #ffffff;
                --color-text: #1e293b;
                --color-text-secondary: #64748b;
                --color-text-muted: #94a3b8;
                --color-border: #e2e8f0;
                --color-border-light: #f1f5f9;

                /* Brand Colors */
                --color-primary: #E8470A;
                --color-primary-dark: #C73C08;
                --color-primary-light: #FEF0EB;
                --color-secondary: #64748b;
                --color-accent: #10b981;

                /* Status Colors */
                --color-success: #10b981;
                --color-success-light: #d1fae5;
                --color-warning: #f59e0b;
                --color-warning-light: #fef3c7;
                --color-error: #ef4444;
                --color-error-light: #fee2e2;
                --color-info: #3b82f6;
                --color-info-light: #dbeafe;

                /* Spacing Scale */
                --space-xs: 0.25rem;
                --space-sm: 0.5rem;
                --space-md: 1rem;
                --space-lg: 1.5rem;
                --space-xl: 2rem;
                --space-2xl: 3rem;

                /* Typography */
                --font-family:
                    "Commissioner", -apple-system, BlinkMacSystemFont,
                    "Segoe UI", sans-serif;
                --font-size-xs: 0.75rem;
                --font-size-sm: 0.875rem;
                --font-size-md: 1rem;
                --font-size-lg: 1.125rem;
                --font-size-xl: 1.25rem;
                --font-size-2xl: 1.5rem;
                --font-size-3xl: 2rem;
                --font-size-4xl: 2.5rem;

                /* Border Radius */
                --radius-sm: 4px;
                --radius-md: 8px;
                --radius-lg: 12px;
                --radius-xl: 16px;
                --radius-full: 9999px;

                /* Shadows */
                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
                --shadow-md:
                    0 4px 6px -1px rgba(0, 0, 0, 0.1),
                    0 2px 4px -1px rgba(0, 0, 0, 0.06);
                --shadow-lg:
                    0 10px 15px -3px rgba(0, 0, 0, 0.1),
                    0 4px 6px -2px rgba(0, 0, 0, 0.05);
                --shadow-xl:
                    0 20px 25px -5px rgba(0, 0, 0, 0.1),
                    0 10px 10px -5px rgba(0, 0, 0, 0.04);

                /* Transitions */
                --transition-fast: 150ms ease;
                --transition-base: 250ms ease;
                --transition-slow: 350ms ease;

                /* Layout */
                --sidebar-width: 224px;
                --header-height: 64px;
            }

            /* Dark Theme */
            [data-theme="dark"] {
                --color-bg: #0f172a;
                --color-surface: #1e293b;
                --color-surface-elevated: #334155;
                --color-text: #f8fafc;
                --color-text-secondary: #cbd5e1;
                --color-text-muted: #94a3b8;
                --color-border: #334155;
                --color-border-light: #475569;

                --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.3);
                --shadow-md:
                    0 4px 6px -1px rgba(0, 0, 0, 0.4),
                    0 2px 4px -1px rgba(0, 0, 0, 0.2);
                --shadow-lg:
                    0 10px 15px -3px rgba(0, 0, 0, 0.4),
                    0 4px 6px -2px rgba(0, 0, 0, 0.2);
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: var(--font-family);
                background-color: var(--color-bg);
                color: var(--color-text);
                line-height: 1.6;
                transition:
                    background-color var(--transition-base),
                    color var(--transition-base);
            }

            /* App Layout with Sidebar */
            .app-layout {
                display: flex;
                min-height: 100vh;
            }

            /* Sidebar */
            .sidebar {
                width: var(--sidebar-width);
                background: var(--color-surface);
                border-right: 1px solid var(--color-border);
                display: flex;
                flex-direction: column;
                position: fixed;
                height: 100vh;
                left: 0;
                top: 0;
                z-index: 100;
            }

            .sidebar-brand {
                padding: var(--space-lg);
                border-bottom: 1px solid var(--color-border);
                background: linear-gradient(
                    135deg,
                    var(--color-primary) 0%,
                    var(--color-primary-dark) 100%
                );
            }

            .brand-title {
                font-size: var(--font-size-xl);
                font-weight: 700;
                color: white;
                margin: 0;
            }

            .brand-subtitle {
                font-size: var(--font-size-xs);
                color: rgba(255, 255, 255, 0.8);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .sidebar-nav {
                flex: 1;
                padding: var(--space-md);
                overflow-y: auto;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: var(--space-sm);
                width: 100%;
                padding: var(--space-sm) var(--space-md);
                background: transparent;
                border: none;
                border-radius: var(--radius-md);
                color: var(--color-text-secondary);
                cursor: pointer;
                transition: all var(--transition-fast);
                font-size: var(--font-size-sm);
                font-weight: 500;
                text-align: left;
                margin-bottom: var(--space-xs);
            }

            /* nav-item hover/active: see Baseella reskin section below */

            .nav-icon {
                font-size: 20px;
                line-height: 1;
                flex-shrink: 0;
            }

            .nav-label {
                flex: 1;
            }

            .sidebar-section-title {
                font-size: var(--font-size-xs);
                font-weight: 600;
                color: var(--color-text-muted);
                text-transform: uppercase;
                letter-spacing: 0.05em;
                padding: var(--space-md) var(--space-md) var(--space-sm);
            }

            .quick-action-btn {
                width: 100%;
                margin-bottom: var(--space-sm);
                justify-content: center;
            }

            /* Main Content */
            .main-content {
                flex: 1;
                margin-left: var(--sidebar-width);
                display: flex;
                flex-direction: column;
            }

            .main-header {
                height: var(--header-height);
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 var(--space-xl);
                position: sticky;
                top: 0;
                z-index: 50;
            }

            .page-title {
                font-size: var(--font-size-xl);
                font-weight: 600;
                color: var(--color-text);
                margin: 0;
            }

            .header-actions {
                display: flex;
                gap: var(--space-sm);
            }

            .header-btn {
                background: transparent;
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                padding: var(--space-sm);
                cursor: pointer;
                color: var(--color-text-secondary);
                transition: all var(--transition-fast);
            }

            .header-btn:hover {
                background: var(--color-border-light);
                color: var(--color-text);
            }

            .header-icon {
                font-size: 20px;
                line-height: 1;
            }

            .content-area {
                flex: 1;
                padding: var(--space-xl);
                overflow-y: auto;
            }

            /* Dashboard View */
            .dashboard-view {
                max-width: 1400px;
            }

            .summary-cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
                gap: var(--space-lg);
                margin-bottom: var(--space-xl);
            }

            .summary-card {
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                padding: var(--space-lg);
                box-shadow: var(--shadow-md);
                border: 1px solid var(--color-border);
                transition:
                    transform var(--transition-fast),
                    box-shadow var(--transition-fast);
            }

            .summary-card:hover {
                transform: translateY(-2px);
                box-shadow: var(--shadow-lg);
            }

            .card-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: var(--space-md);
            }

            .card-icon {
                width: 40px;
                height: 40px;
                border-radius: var(--radius-md);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .card-icon.blue {
                background: var(--color-info-light);
                color: var(--color-info);
            }
            .card-icon.green {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .card-icon.purple {
                background: #ede9fe;
                color: #7c3aed;
            }
            .card-icon.orange {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }

            .card-icon .icon {
                font-size: 20px;
                line-height: 1;
            }

            .card-content {
                text-align: left;
            }

            .card-value {
                font-size: var(--font-size-3xl);
                font-weight: 700;
                color: var(--color-text);
                margin-bottom: var(--space-xs);
            }

            .card-title {
                font-size: var(--font-size-sm);
                color: var(--color-text-secondary);
                font-weight: 500;
            }

            .dashboard-two-col {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--space-xl);
            }

            @media (max-width: 1024px) {
                .dashboard-two-col {
                    grid-template-columns: 1fr;
                }
            }

            .dashboard-card {
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                padding: var(--space-lg);
                box-shadow: var(--shadow-md);
                border: 1px solid var(--color-border);
            }

            .card-header-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: var(--space-lg);
                padding-bottom: var(--space-md);
                border-bottom: 1px solid var(--color-border);
            }

            .card-header-row h3 {
                font-size: var(--font-size-lg);
                font-weight: 600;
                color: var(--color-text);
            }

            .activity-list {
                display: flex;
                flex-direction: column;
                gap: var(--space-md);
            }

            .activity-item {
                display: flex;
                gap: var(--space-md);
                padding: var(--space-sm);
                border-radius: var(--radius-md);
                transition: background var(--transition-fast);
            }

            .activity-item:hover {
                background: var(--color-border-light);
            }

            .activity-icon {
                width: 36px;
                height: 36px;
                border-radius: var(--radius-full);
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--color-border-light);
                flex-shrink: 0;
            }

            .activity-icon.success {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .activity-icon.warning {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }

            .activity-icon .icon-sm {
                width: 16px;
                height: 16px;
            }

            .activity-content {
                flex: 1;
                min-width: 0;
            }

            .activity-desc {
                font-size: var(--font-size-sm);
                font-weight: 500;
                color: var(--color-text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .activity-meta {
                font-size: var(--font-size-xs);
                color: var(--color-text-muted);
            }

            .quick-actions-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: var(--space-md);
            }

            .quick-action-card {
                background: var(--color-border-light);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                padding: var(--space-md);
                cursor: pointer;
                transition: all var(--transition-fast);
                text-align: left;
            }

            .quick-action-card:hover {
                background: var(--color-surface);
                border-color: var(--color-primary);
                box-shadow: var(--shadow-md);
            }

            .action-icon {
                width: 36px;
                height: 36px;
                border-radius: var(--radius-md);
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: var(--space-sm);
            }

            .action-icon.primary {
                background: var(--color-info-light);
                color: var(--color-info);
            }
            .action-icon.success {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .action-icon.info {
                background: #ede9fe;
                color: #7c3aed;
            }
            .action-icon.warning {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }

            .action-icon .icon {
                font-size: 18px;
                line-height: 1;
            }

            .action-label {
                font-size: var(--font-size-sm);
                font-weight: 600;
                color: var(--color-text);
                margin-bottom: var(--space-xs);
            }

            .action-desc {
                font-size: var(--font-size-xs);
                color: var(--color-text-muted);
            }

            /* View Toolbar */
            .view-toolbar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: var(--space-lg);
            }

            .search-wrapper {
                position: relative;
                width: 300px;
            }

            .search-icon {
                position: absolute;
                left: var(--space-sm);
                top: 50%;
                transform: translateY(-50%);
                width: 18px;
                height: 18px;
                color: var(--color-text-muted);
            }

            .search-input {
                width: 100%;
                padding: var(--space-sm) var(--space-sm) var(--space-sm) 36px;
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                font-size: var(--font-size-sm);
                background: var(--color-surface);
                color: var(--color-text);
            }

            .search-input:focus {
                outline: none;
                border-color: var(--color-primary);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            }

            /* Filter Bar */
            .filter-bar {
                display: flex;
                gap: var(--space-sm);
                margin-bottom: var(--space-lg);
            }

            .filter-btn {
                padding: var(--space-xs) var(--space-md);
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-full);
                font-size: var(--font-size-sm);
                color: var(--color-text-secondary);
                cursor: pointer;
                transition: all var(--transition-fast);
            }

            .filter-btn:hover {
                border-color: var(--color-primary);
                color: var(--color-primary);
            }

            .filter-btn.active {
                background: var(--color-primary);
                border-color: var(--color-primary);
                color: white;
            }

            /* Data Table */
            .data-table {
                width: 100%;
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                overflow: hidden;
                box-shadow: var(--shadow-md);
                border: 1px solid var(--color-border);
            }

            .data-table th,
            .data-table td {
                padding: var(--space-md);
                text-align: left;
                border-bottom: 1px solid var(--color-border);
            }

            .data-table th {
                background: var(--color-border-light);
                font-weight: 600;
                font-size: var(--font-size-sm);
                color: var(--color-text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .data-table tr:last-child td {
                border-bottom: none;
            }

            .data-table tr:hover {
                background: var(--color-border-light);
            }

            .cell-primary {
                font-weight: 600;
                color: var(--color-text);
            }

            .cell-mono {
                font-family: "Monaco", "Menlo", monospace;
                font-size: var(--font-size-xs);
                color: var(--color-text-muted);
            }

            .cell-balance {
                font-weight: 600;
                font-family: "Monaco", "Menlo", monospace;
            }

            /* Status Badge */
            .status-badge {
                display: inline-flex;
                align-items: center;
                padding: 2px 8px;
                border-radius: var(--radius-full);
                font-size: var(--font-size-xs);
                font-weight: 600;
                text-transform: capitalize;
            }

            .status-badge.active {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .status-badge.frozen {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }
            .status-badge.closed {
                background: var(--color-error-light);
                color: var(--color-error);
            }
            .status-badge.pending {
                background: var(--color-info-light);
                color: var(--color-info);
            }
            .status-badge.posted {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .status-badge.failed {
                background: var(--color-error-light);
                color: var(--color-error);
            }

            /* Type Badge */
            .type-badge {
                display: inline-flex;
                align-items: center;
                padding: 2px 8px;
                border-radius: var(--radius-full);
                font-size: var(--font-size-xs);
                font-weight: 600;
                text-transform: capitalize;
            }

            .type-badge.deposit {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .type-badge.withdrawal {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }
            .type-badge.transfer {
                background: var(--color-info-light);
                color: var(--color-info);
            }
            .type-badge.credit {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .type-badge.debit {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }

            /* Status Badge Large */
            .status-badge-lg {
                display: inline-flex;
                align-items: center;
                padding: 4px 12px;
                border-radius: var(--radius-full);
                font-size: var(--font-size-sm);
                font-weight: 600;
                text-transform: capitalize;
            }

            .status-badge-lg.active {
                background: var(--color-success-light);
                color: var(--color-success);
            }
            .status-badge-lg.frozen {
                background: var(--color-warning-light);
                color: var(--color-warning);
            }
            .status-badge-lg.closed {
                background: var(--color-error-light);
                color: var(--color-error);
            }

            /* Buttons */
            .btn {
                padding: var(--space-sm) var(--space-md);
                border: none;
                border-radius: var(--radius-md);
                cursor: pointer;
                font-size: var(--font-size-sm);
                font-weight: 500;
                transition: all var(--transition-fast);
                display: inline-flex;
                align-items: center;
                gap: var(--space-xs);
            }

            .btn-primary {
                background-color: var(--color-primary);
                color: white;
            }

            .btn-primary:hover {
                background-color: var(--color-primary-dark);
                transform: translateY(-1px);
                box-shadow: var(--shadow-md);
            }

            .btn-secondary {
                background-color: var(--color-surface);
                color: var(--color-text);
                border: 1px solid var(--color-border);
            }

            .btn-secondary:hover {
                background-color: var(--color-border-light);
            }

            .btn-success {
                background-color: var(--color-success);
                color: white;
            }

            .btn-success:hover {
                background-color: #059669;
            }

            .btn-warning {
                background-color: var(--color-warning);
                color: white;
            }

            .btn-warning:hover {
                background-color: #d97706;
            }

            .btn-danger {
                background-color: var(--color-error);
                color: white;
            }

            .btn-danger:hover {
                background-color: #dc2626;
            }

            .btn-ghost {
                background: transparent;
                color: var(--color-text-secondary);
            }

            .btn-ghost:hover {
                background: var(--color-border-light);
                color: var(--color-text);
            }

            .btn-link {
                background: transparent;
                color: var(--color-primary);
                padding: 0;
            }

            .btn-link:hover {
                text-decoration: underline;
            }

            .btn-sm {
                padding: var(--space-xs) var(--space-sm);
                font-size: var(--font-size-xs);
            }

            .btn-lg {
                padding: var(--space-md) var(--space-lg);
                font-size: var(--font-size-md);
            }

            /* Form Elements */
            .form-card {
                background: var(--color-surface);
                padding: var(--space-lg);
                border-radius: var(--radius-lg);
                margin-bottom: var(--space-xl);
                border: 1px solid var(--color-border);
                box-shadow: var(--shadow-sm);
            }

            .form-card h3 {
                margin-bottom: var(--space-lg);
                font-size: var(--font-size-lg);
                font-weight: 600;
                color: var(--color-text);
            }

            .form-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--space-md);
            }

            .form-stack {
                display: flex;
                flex-direction: column;
                gap: var(--space-md);
            }

            .form-input,
            .form-select {
                width: 100%;
                padding: var(--space-sm) var(--space-md);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                font-size: var(--font-size-sm);
                background-color: var(--color-surface);
                color: var(--color-text);
                transition:
                    border-color var(--transition-fast),
                    box-shadow var(--transition-fast);
            }

            .form-input:focus,
            .form-select:focus {
                outline: none;
                border-color: var(--color-primary);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            }

            .form-actions {
                display: flex;
                gap: var(--space-md);
                margin-top: var(--space-md);
            }

            label {
                display: block;
                margin-bottom: var(--space-xs);
                font-weight: 500;
                font-size: var(--font-size-sm);
                color: var(--color-text);
            }

            /* Alert */
            .alert {
                padding: var(--space-md);
                border-radius: var(--radius-md);
                margin-bottom: var(--space-lg);
                font-size: var(--font-size-sm);
            }

            .alert-error {
                background-color: var(--color-error-light);
                color: var(--color-error);
                border: 1px solid var(--color-error);
            }

            .alert-success {
                background-color: var(--color-success-light);
                color: var(--color-success);
                border: 1px solid var(--color-success);
            }

            /* Empty State */
            .empty-state {
                text-align: center;
                padding: var(--space-lg);
                color: var(--color-text-muted);
                font-size: var(--font-size-sm);
            }

            .empty-state-large {
                text-align: center;
                padding: var(--space-2xl);
                color: var(--color-text-muted);
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                border: 1px dashed var(--color-border);
            }

            /* Loading */
            .loading-spinner {
                text-align: center;
                padding: var(--space-2xl);
                color: var(--color-text-muted);
            }

            /* Account Detail View */
            .account-detail-view {
                max-width: 1200px;
            }

            .back-btn {
                margin-bottom: var(--space-lg);
            }

            .account-header-card {
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                padding: var(--space-xl);
                margin-bottom: var(--space-lg);
                border: 1px solid var(--color-border);
                box-shadow: var(--shadow-md);
            }

            .account-header-top {
                display: flex;
                align-items: center;
                gap: var(--space-md);
                margin-bottom: var(--space-md);
            }

            .account-name {
                font-size: var(--font-size-2xl);
                font-weight: 700;
                color: var(--color-text);
                margin: 0;
            }

            .account-id {
                font-family: "Monaco", "Menlo", monospace;
                font-size: var(--font-size-sm);
                color: var(--color-text-muted);
            }

            .detail-stats {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: var(--space-lg);
                margin-bottom: var(--space-lg);
            }

            .detail-stat {
                background: var(--color-surface);
                border-radius: var(--radius-md);
                padding: var(--space-md);
                border: 1px solid var(--color-border);
            }

            .stat-label {
                font-size: var(--font-size-sm);
                color: var(--color-text-secondary);
                margin-bottom: var(--space-xs);
            }

            .stat-value {
                font-size: var(--font-size-lg);
                font-weight: 600;
                color: var(--color-text);
            }

            .stat-value-lg {
                font-size: var(--font-size-2xl);
                font-weight: 700;
                color: var(--color-text);
            }

            .account-actions {
                display: flex;
                gap: var(--space-md);
                margin-bottom: var(--space-xl);
            }

            .detail-section {
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                padding: var(--space-lg);
                border: 1px solid var(--color-border);
                margin-bottom: var(--space-lg);
            }

            .detail-section h3 {
                font-size: var(--font-size-lg);
                font-weight: 600;
                margin-bottom: var(--space-lg);
                padding-bottom: var(--space-md);
                border-bottom: 1px solid var(--color-border);
            }

            /* Settings View */
            .settings-view {
                max-width: 800px;
            }

            .settings-view h2 {
                font-size: var(--font-size-2xl);
                font-weight: 600;
                margin-bottom: var(--space-xl);
            }

            .settings-card {
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                border: 1px solid var(--color-border);
                overflow: hidden;
            }

            .setting-item {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: var(--space-lg);
                border-bottom: 1px solid var(--color-border);
            }

            .setting-item:last-child {
                border-bottom: none;
            }

            .setting-label h4 {
                font-size: var(--font-size-md);
                font-weight: 600;
                margin-bottom: var(--space-xs);
            }

            .setting-label p {
                font-size: var(--font-size-sm);
                color: var(--color-text-muted);
            }

            .setting-value code {
                background: var(--color-border-light);
                padding: var(--space-xs) var(--space-sm);
                border-radius: var(--radius-sm);
                font-family: "Monaco", "Menlo", monospace;
                font-size: var(--font-size-sm);
            }

            /* Transfer/Deposit View */
            .transfer-view,
            .deposit-view {
                max-width: 800px;
            }

            .transfer-view h2,
            .deposit-view h2 {
                font-size: var(--font-size-2xl);
                font-weight: 600;
                margin-bottom: var(--space-lg);
            }

            .two-col-forms {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: var(--space-xl);
            }

            @media (max-width: 768px) {
                .two-col-forms {
                    grid-template-columns: 1fr;
                }
            }

            /* Filter Card */
            .filter-card {
                background: var(--color-surface);
                border-radius: var(--radius-lg);
                padding: var(--space-lg);
                margin-bottom: var(--space-lg);
                border: 1px solid var(--color-border);
                display: flex;
                align-items: flex-end;
                gap: var(--space-md);
            }

            .filter-card label {
                margin-bottom: 0;
            }

            .filter-card .form-input {
                width: auto;
                flex: 1;
            }

            /* Responsive */
            @media (max-width: 768px) {
                .sidebar {
                    transform: translateX(-100%);
                }

                .main-content {
                    margin-left: 0;
                }

                .summary-cards {
                    grid-template-columns: 1fr;
                }
            }

            [data-theme="dark"] {
                --color-bg: #0f172a;
                --color-surface: #111827;
                --color-surface-elevated: #1f2937;
                --color-text: #f8fafc;
                --color-text-secondary: #cbd5e1;
                --color-text-muted: #94a3b8;
                --color-border: #334155;
                --color-border-light: #1e293b;

                --color-primary: #F4703A;
                --color-primary-dark: #E8470A;
                --color-primary-light: rgba(232, 71, 10, 0.18);

                --shadow-sm: 0 1px 2px rgba(2, 6, 23, 0.4);
                --shadow-md: 0 8px 20px rgba(2, 6, 23, 0.45);
                --shadow-lg: 0 24px 40px rgba(2, 6, 23, 0.55);
            }

            body {
                background: var(--color-bg);
                color: var(--color-text);
            }

            .sidebar {
                background: var(--color-surface);
                border-right: 1px solid var(--color-border);
                box-shadow: 6px 0 22px rgba(16, 24, 40, 0.04);
            }

            .sidebar-brand {
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                padding: 16px 16px;
            }

            .brand-title {
                color: var(--color-text);
                letter-spacing: 0.07em;
                text-transform: uppercase;
                font-size: 0.9rem;
            }

            .brand-subtitle {
                color: var(--color-text-muted);
                font-size: 0.72rem;
            }

            .sidebar-nav {
                padding: 8px 0;
                flex: 1;
                overflow-y: auto;
            }

            .nav-item {
                border-radius: 0;
                padding: 9px 16px 9px 13px;
                font-weight: 500;
                color: var(--color-text-secondary);
                border: none;
                border-left: 3px solid transparent;
                margin-bottom: 0;
                font-size: 0.875rem;
            }

            .nav-item:hover {
                background: rgba(0, 0, 0, 0.03);
                border-left-color: var(--color-border);
                color: var(--color-text);
            }

            .nav-item.active {
                background: rgba(232, 71, 10, 0.07);
                color: var(--color-primary);
                border-left-color: var(--color-primary);
                font-weight: 600;
            }

            [data-theme="dark"] .nav-item:hover {
                background: rgba(255, 255, 255, 0.04);
            }

            [data-theme="dark"] .nav-item.active {
                background: rgba(232, 71, 10, 0.14);
                color: var(--color-primary);
            }

            .main-header {
                background: var(--color-surface);
                border-bottom: 1px solid var(--color-border);
                padding: 0 24px;
            }

            .page-title {
                font-size: 1.1rem;
                font-weight: 700;
                color: var(--color-text);
            }

            .header-actions {
                gap: 8px;
            }

            .header-btn {
                border: 1px solid var(--color-border);
                background: var(--color-surface);
                color: var(--color-text-secondary);
                min-height: 38px;
                border-radius: 10px;
                padding: 0 12px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                gap: 8px;
                cursor: pointer;
                transition: all 160ms ease;
            }

            .header-btn:hover {
                color: var(--color-text);
                border-color: #cfd4dc;
                box-shadow: var(--shadow-sm);
            }

            .content-area {
                padding: 24px;
            }

            .dashboard-card,
            .form-card,
            .detail-section,
            .settings-card,
            .filter-card {
                border: 1px solid var(--color-border);
                border-radius: var(--radius-lg);
                box-shadow: var(--shadow-sm);
                background: var(--color-surface);
            }

            .dashboard-card,
            .form-card,
            .detail-section,
            .filter-card {
                padding: 18px;
            }

            .summary-card {
                border: 1px solid var(--color-border);
                border-radius: 14px;
                box-shadow: var(--shadow-sm);
                background: var(--color-surface);
            }

            .card-value {
                font-weight: 700;
            }

            .view-toolbar {
                border: none;
                border-radius: 0;
                background: transparent;
                padding: 0 0 16px 0;
                box-shadow: none;
            }

            .search-wrapper {
                background: var(--color-surface-elevated);
            }

            .search-input,
            .form-input,
            input,
            select,
            textarea {
                border: 1px solid var(--color-border);
                border-radius: 10px;
                min-height: 40px;
                padding: 9px 12px;
                color: var(--color-text);
                background: var(--color-surface);
                transition: border-color 150ms ease, box-shadow 150ms ease;
            }

            .search-input:focus,
            .form-input:focus,
            input:focus,
            select:focus,
            textarea:focus {
                outline: none;
                border-color: var(--color-primary);
                box-shadow: 0 0 0 3px rgba(232, 71, 10, 0.12);
            }

            .form-label,
            label {
                font-size: 0.86rem;
                font-weight: 600;
                color: var(--color-text-secondary);
                margin-bottom: 6px;
                display: inline-block;
            }

            .btn {
                border-radius: 10px;
                border: 1px solid transparent;
                font-weight: 600;
                min-height: 40px;
                transition: all 150ms ease;
            }

            .btn-primary {
                background: var(--color-primary);
                border-color: var(--color-primary);
                color: #fff;
            }

            .btn-primary:hover {
                background: var(--color-primary-dark);
                border-color: var(--color-primary-dark);
            }

            .btn-success {
                background: var(--color-success);
                border-color: var(--color-success);
                color: #fff;
            }

            .btn-ghost,
            .btn-link {
                background: transparent;
                border-color: var(--color-border);
                color: var(--color-text-secondary);
            }

            .data-table {
                border-collapse: separate;
                border-spacing: 0;
                overflow: hidden;
                border: 1px solid var(--color-border);
                border-radius: 12px;
                background: var(--color-surface);
            }

            .data-table thead tr {
                background: var(--color-border-light);
            }

            .data-table th {
                color: var(--color-text-secondary);
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: 0.03em;
                font-weight: 700;
                border-bottom: 1px solid var(--color-border);
            }

            .data-table td {
                border-bottom: 1px solid var(--color-border-light);
            }

            .data-table tbody tr:hover {
                background: var(--color-border-light);
            }

            .status-badge {
                border-radius: 9999px;
                border: 1px solid var(--color-border);
                font-weight: 700;
                font-size: 0.72rem;
                letter-spacing: 0.01em;
                text-transform: capitalize;
            }

            .alert {
                border-radius: 12px;
                border: 1px solid var(--color-border);
                box-shadow: var(--shadow-sm);
            }

            .loading-spinner {
                border-radius: 14px;
                border: 1px dashed var(--color-border);
                color: var(--color-text-secondary);
                background: color-mix(in srgb, var(--color-border-light) 75%, transparent);
            }

            .login-shell {
                min-height: calc(100vh - 64px);
                display: grid;
                grid-template-columns: 1.1fr minmax(360px, 460px);
                gap: 26px;
                align-items: stretch;
            }

            .login-hero {
                border-radius: 22px;
                border: 1px solid color-mix(in srgb, var(--color-primary) 25%, var(--color-border));
                background:
                    radial-gradient(circle at 80% 8%, rgba(255, 255, 255, 0.22), transparent 34%),
                    linear-gradient(145deg, #465fff, #2e3ed6);
                color: #fff;
                padding: clamp(26px, 5vw, 44px);
                display: flex;
                flex-direction: column;
                justify-content: flex-end;
                box-shadow: var(--shadow-lg);
            }

            .login-hero-title {
                font-size: clamp(1.65rem, 3.5vw, 2.45rem);
                line-height: 1.2;
                margin-bottom: 10px;
                color: #fff;
            }

            .login-hero-subtitle {
                max-width: 40ch;
                color: rgba(255, 255, 255, 0.9);
                margin-bottom: 16px;
            }

            .login-hero-meta {
                display: inline-flex;
                align-self: flex-start;
                border: 1px solid rgba(255, 255, 255, 0.25);
                border-radius: 999px;
                padding: 6px 12px;
                font-size: 0.8rem;
                background: rgba(255, 255, 255, 0.12);
            }

            .login-auth {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .login-card {
                width: 100%;
                max-width: 430px;
                border-radius: 18px;
                box-shadow: var(--shadow-md);
            }

            .login-card .page-title {
                margin-bottom: 8px;
            }

            .login-card p {
                color: var(--color-text-muted);
                margin-bottom: 14px;
            }

            .login-form {
                display: grid;
                gap: 10px;
            }

            #login-submit {
                margin-top: 8px;
            }

            @media (max-width: 1024px) {
                .login-shell {
                    grid-template-columns: 1fr;
                }

                .login-hero {
                    min-height: 180px;
                }

                .login-auth {
                    justify-content: flex-start;
                }
            }

            @media (max-width: 768px) {
                .main-header {
                    padding: 0 14px;
                }

                .content-area {
                    padding: 14px;
                }

                .dashboard-card,
                .form-card,
                .detail-section,
                .filter-card {
                    padding: 14px;
                }

                .sidebar {
                    box-shadow: none;
                }
            }

            /* ── Sidebar logo mark ── */
            .brand-logo {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .brand-mark {
                width: 30px;
                height: 30px;
                border-radius: 8px;
                background: var(--color-primary);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.72rem;
                font-weight: 800;
                letter-spacing: 0.02em;
                flex-shrink: 0;
            }

            .brand-text {
                display: flex;
                flex-direction: column;
            }

            /* ── Sidebar nav section label ── */
            .sidebar-section-label {
                font-size: 0.67rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.08em;
                color: var(--color-text-muted);
                padding: 12px 16px 4px;
            }

            /* ── Sidebar footer ── */
            .sidebar-footer {
                padding: 12px 16px;
                border-top: 1px solid var(--color-border);
            }

            /* ── Section headers (Baseella-style) ── */
            .section-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 18px;
            }

            .section-header-left {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .section-icon {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: var(--color-text);
                display: flex;
                align-items: center;
                justify-content: center;
                color: white;
                font-size: 13px;
                flex-shrink: 0;
                line-height: 1;
            }

            .section-title {
                font-size: 1rem;
                font-weight: 700;
                color: var(--color-text);
                margin: 0;
            }

            .section-link {
                font-size: 0.8rem;
                color: var(--color-text-muted);
                cursor: pointer;
                background: none;
                border: none;
                padding: 4px 8px;
                border-radius: 6px;
                display: flex;
                align-items: center;
                gap: 2px;
                font-family: inherit;
                font-weight: 500;
                transition: color 120ms, background 120ms;
            }

            .section-link:hover {
                color: var(--color-primary);
                background: var(--color-primary-light);
            }

            /* ── Metric rows ── */
            .metric-section {
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-lg);
                padding: 20px;
                box-shadow: var(--shadow-sm);
            }

            .metric-row {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 9px 0;
                border-bottom: 1px solid var(--color-border-light);
            }

            .metric-row:last-child {
                border-bottom: none;
                padding-bottom: 0;
            }

            .metric-row:first-child {
                padding-top: 0;
            }

            .metric-label {
                font-size: 0.84rem;
                color: var(--color-text-secondary);
            }

            .metric-value-group {
                display: flex;
                align-items: center;
                gap: 10px;
            }

            .metric-value {
                font-size: 0.9rem;
                font-weight: 700;
                color: var(--color-text);
                font-variant-numeric: tabular-nums;
            }

            .metric-delta {
                font-size: 0.72rem;
                font-weight: 600;
                padding: 2px 6px;
                border-radius: 4px;
            }

            .metric-delta.positive {
                color: #059669;
                background: #D1FAE5;
            }

            .metric-delta.neutral {
                color: var(--color-text-muted);
                background: var(--color-border-light);
            }

            /* ── User avatar in header ── */
            .user-avatar {
                width: 30px;
                height: 30px;
                border-radius: 50%;
                background: var(--color-primary);
                color: white;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.72rem;
                font-weight: 800;
                letter-spacing: 0.03em;
                flex-shrink: 0;
            }

            .user-pill {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 4px 12px 4px 4px;
                border: 1px solid var(--color-border);
                border-radius: 99px;
                cursor: default;
                background: var(--color-surface);
                font-size: 0.82rem;
                font-weight: 500;
                color: var(--color-text-secondary);
            }

            /* ── Stat strip (replaces big summary cards) ── */
            .stat-strip {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
                margin-bottom: 20px;
            }

            .stat-strip-card {
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md);
                padding: 14px 16px;
                box-shadow: var(--shadow-sm);
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .stat-strip-icon {
                width: 36px;
                height: 36px;
                border-radius: 9px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                font-size: 18px;
            }

            .stat-strip-icon.orange {
                background: var(--color-primary-light);
                color: var(--color-primary);
            }
            .stat-strip-icon.green {
                background: #D1FAE5;
                color: #059669;
            }
            .stat-strip-icon.blue {
                background: #DBEAFE;
                color: #2563EB;
            }
            .stat-strip-icon.amber {
                background: #FEF3C7;
                color: #D97706;
            }

            .stat-strip-body {
                min-width: 0;
            }

            .stat-strip-value {
                font-size: 1.2rem;
                font-weight: 800;
                color: var(--color-text);
                line-height: 1.2;
                font-variant-numeric: tabular-nums;
            }

            .stat-strip-label {
                font-size: 0.76rem;
                color: var(--color-text-muted);
                margin-top: 1px;
            }

            /* ── Dashboard two-col with section cards ── */
            .dashboard-section-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 16px;
            }

            @media (max-width: 1024px) {
                .stat-strip {
                    grid-template-columns: repeat(2, 1fr);
                }
                .dashboard-section-grid {
                    grid-template-columns: 1fr;
                }
            }

            /* ── Nav divider ── */
            .nav-divider {
                height: 1px;
                background: var(--color-border);
                margin: 6px 16px;
            }

            /* ── Activity item clean style ── */
            .activity-row {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 9px 0;
                border-bottom: 1px solid var(--color-border-light);
            }

            .activity-row:last-child {
                border-bottom: none;
                padding-bottom: 0;
            }

            .activity-row:first-child {
                padding-top: 0;
            }

            .activity-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                flex-shrink: 0;
            }

            .activity-dot.credit { background: #059669; }
            .activity-dot.debit  { background: #E8470A; }
            .activity-dot.neutral { background: var(--color-text-muted); }

            .activity-row-desc {
                flex: 1;
                min-width: 0;
                font-size: 0.84rem;
                color: var(--color-text);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }

            .activity-row-meta {
                font-size: 0.75rem;
                color: var(--color-text-muted);
                white-space: nowrap;
            }

            .activity-row-amount {
                font-size: 0.84rem;
                font-weight: 700;
                font-variant-numeric: tabular-nums;
                white-space: nowrap;
            }

            .activity-row-amount.credit { color: #059669; }
            .activity-row-amount.debit  { color: var(--color-error); }

            /* ── Customers page panels ── */
            .customers-view {
                display: flex;
                flex-direction: column;
                gap: 0;
            }

            .customers-filter-panel {
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: var(--radius-md) var(--radius-md) 0 0;
                padding: 16px 20px;
                box-shadow: var(--shadow-sm);
            }

            .customers-filter-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 14px;
            }

            .customers-filter-title {
                display: flex;
                align-items: center;
                gap: 7px;
                font-size: 0.8rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.06em;
                color: var(--color-text-muted);
            }

            .customers-filter-row {
                display: flex;
                align-items: center;
                gap: 12px;
                flex-wrap: wrap;
            }

            .customers-search {
                flex: 1;
                min-width: 200px;
            }

            .filter-chip-group {
                display: flex;
                gap: 6px;
                flex-shrink: 0;
            }

            .filter-chip {
                padding: 5px 12px;
                border-radius: 999px;
                border: 1px solid var(--color-border);
                background: transparent;
                font-size: 0.8rem;
                font-weight: 500;
                color: var(--color-text-secondary);
                cursor: pointer;
                transition: all 120ms;
            }

            .filter-chip:hover {
                border-color: var(--color-primary);
                color: var(--color-primary);
            }

            .filter-chip.active {
                background: var(--color-primary);
                border-color: var(--color-primary);
                color: white;
            }

            .customers-inline-form {
                margin-top: 14px;
                padding-top: 14px;
                border-top: 1px dashed var(--color-border);
            }

            .customers-inline-form-label {
                font-size: 0.78rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.05em;
                color: var(--color-text-muted);
                margin-bottom: 10px;
            }

            .customers-inline-form-fields {
                display: flex;
                gap: 10px;
                align-items: center;
                flex-wrap: wrap;
            }

            .customers-inline-form-fields .form-input {
                flex: 1;
                min-width: 160px;
            }

            /* Divider between panels — a thick border shadow line */
            .customers-results-panel {
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-top: 3px solid var(--color-primary);
                border-radius: 0 0 var(--radius-md) var(--radius-md);
                box-shadow: var(--shadow-sm);
                overflow: hidden;
            }

            .customers-results-header {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 12px 20px;
                border-bottom: 1px solid var(--color-border);
                background: var(--color-border-light);
            }

            .customers-results-count {
                font-size: 0.8rem;
                font-weight: 600;
                color: var(--color-text-secondary);
                text-transform: uppercase;
                letter-spacing: 0.05em;
            }

            .customers-results-panel .data-table {
                border-radius: 0;
                box-shadow: none;
                border: none;
            }

            .customers-results-panel .empty-state-large {
                padding: 48px 20px;
                text-align: center;
            }

            </style>
    </head>
    <body>
        <div id="root">
            <div id="loading">Loading IronLedger Dashboard...</div>
        </div>

        <script src="wasm_exec.js"></script>
        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(
                fetch("ironledger.wasm?v=10"),
                go.importObject,
            )
                .then((result) => {
                    go.run(result.instance);
                })
                .catch((err) => {
                    document.getElementById("root").innerHTML =
                        '<div class="alert alert-error">Error loading WebAssembly: ' +
                        err.message +
                        "</div>";
                });
        </script>
    </body>
</html>

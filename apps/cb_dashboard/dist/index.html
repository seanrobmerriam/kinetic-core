                display: flex; align-items: flex-start; gap: 14px;
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 14px;
                padding: 18px 18px 16px;
                box-shadow: var(--shadow-sm);
                transition: all 200ms ease;
                position: relative; overflow: hidden;
            }
            .stat-strip-card::after {
                content: ""; position: absolute;
                left: 0; top: 0; bottom: 0; width: 3px;
                background: var(--color-accent); opacity: 0; transition: opacity 200ms ease;
            }
            .stat-strip-card:hover { border-color: var(--color-accent); box-shadow: var(--shadow-md); transform: translateY(-1px); }
            .stat-strip-card:hover::after { opacity: 1; }
            .stat-strip-icon {
                width: 44px; height: 44px;
                border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                flex-shrink: 0;
            }
            .stat-strip-icon .material-symbols-outlined,
            .stat-strip-icon .material-icons { font-size: 22px; }
            .stat-strip-icon.blue { background: var(--color-info-light); color: var(--color-info); }
            .stat-strip-icon.green { background: var(--color-accent-light); color: var(--color-accent-dark); }
            .stat-strip-icon.orange { background: #fdecd9; color: #c2410c; }
            .stat-strip-icon.amber { background: var(--color-warning-light); color: #b45309; }
            .stat-strip-body { flex: 1; min-width: 0; }
            .stat-strip-value {
                font-size: 1.5rem; font-weight: 700; color: var(--color-text);
                letter-spacing: -0.02em; line-height: 1.15;
            }
            .stat-strip-label {
                font-size: 0.78rem; color: var(--color-text-secondary);
                margin-top: 4px; font-weight: 500;
            }
            .stat-strip-trend {
                display: inline-flex; align-items: center; gap: 4px;
                margin-top: 8px;
                font-size: 0.72rem; font-weight: 600;
                padding: 2px 8px; border-radius: 999px;
            }
            .stat-strip-trend.up { background: var(--color-success-light); color: #047857; }
            .stat-strip-trend.down { background: var(--color-error-light); color: #b91c1c; }
            .stat-strip-trend.flat { background: var(--color-border-light); color: var(--color-text-secondary); }

            /* ── Dashboard 2-column grid ────────────────────────────── */
            .dashboard-section-grid {
                display: grid; grid-template-columns: 2fr 1fr; gap: 20px;
            }
            @media (max-width: 1100px) { .dashboard-section-grid { grid-template-columns: 1fr; } .stat-strip { grid-template-columns: repeat(2, 1fr); } }

            .metric-section {
                background: var(--color-surface);
                border: 1px solid var(--color-border);
                border-radius: 14px;
                padding: 20px 22px;
                box-shadow: var(--shadow-sm);
            }
            .section-header {
                display: flex; align-items: center; justify-content: space-between;
                margin-bottom: 18px; padding-bottom: 14px;
                border-bottom: 1px solid var(--color-border-light);
            }
            .section-header-left { display: flex; align-items: center; gap: 10px; }
            .section-icon {
                width: 30px; height: 30px;
                border-radius: 8px;
                background: var(--color-primary-light);
                color: var(--color-primary);
                display: flex; align-items: center; justify-content: center;
            }
            .section-title { font-size: 0.98rem; font-weight: 700; color: var(--color-text); margin: 0; letter-spacing: -0.01em; }
            .section-link {
                background: transparent; border: none; cursor: pointer;
                color: var(--color-accent-dark); font-size: 0.8rem; font-weight: 600;
                padding: 4px 8px; border-radius: 6px;
            }
            .section-link:hover { background: var(--color-accent-light); }

            /* Activity rows */
            .activity-row {
                display: grid;
                grid-template-columns: 8px 1fr auto auto;
                gap: 12px; align-items: center;
                padding: 12px 4px;
                border-bottom: 1px solid var(--color-border-light);
                font-size: 0.86rem;
            }
            .activity-row:last-child { border-bottom: none; }
            .activity-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--color-text-muted); }
            .activity-dot.credit { background: var(--color-success); }
            .activity-dot.debit { background: var(--color-error); }
            .activity-dot.neutral { background: var(--color-text-muted); }
            .activity-row-desc { color: var(--color-text); font-weight: 500; }
            .activity-row-meta { color: var(--color-text-muted); font-size: 0.76rem; }
            .activity-row-amount { font-weight: 700; font-variant-numeric: tabular-nums; font-size: 0.88rem; }
            .activity-row-amount.credit { color: #047857; }
            .activity-row-amount.debit { color: #b91c1c; }

            /* Metric rows (overview) */
            .metric-row {
                display: flex; justify-content: space-between; align-items: center;
                padding: 11px 0;
                border-bottom: 1px dashed var(--color-border-light);
                font-size: 0.86rem;
            }
            .metric-row:last-of-type { border-bottom: none; }
            .metric-label { color: var(--color-text-secondary); font-weight: 500; }
            .metric-value-group { display: flex; align-items: center; gap: 8px; }
            .metric-value { font-weight: 700; color: var(--color-text); font-variant-numeric: tabular-nums; }
            .metric-delta.positive { color: #047857; font-size: 0.74rem; font-weight: 600; }
            .metric-delta.negative { color: #b91c1c; font-size: 0.74rem; font-weight: 600; }

            /* ── Tasks queue ────────────────────────────────────────── */
            .tasks-section { grid-column: 1 / -1; }
            .tasks-grid {
                display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
                gap: 14px;
            }
            .task-card {
                display: flex; gap: 12px; align-items: flex-start;
                padding: 14px;
                background: var(--color-bg);
                border: 1px solid var(--color-border);
                border-radius: 12px;
                transition: all 180ms ease;
                cursor: pointer;
            }
            .task-card:hover { border-color: var(--color-accent); background: var(--color-surface); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
            .task-icon {
                width: 38px; height: 38px; flex-shrink: 0;
                border-radius: 10px;
                display: flex; align-items: center; justify-content: center;
                background: var(--color-warning-light); color: #b45309;
            }
            .task-icon.kyc { background: #ede9fe; color: #6d28d9; }
            .task-icon.approval { background: var(--color-warning-light); color: #b45309; }
            .task-icon.exception { background: var(--color-error-light); color: #b91c1c; }
            .task-icon.review { background: var(--color-info-light); color: var(--color-info); }
            .task-icon .material-symbols-outlined,
            .task-icon .material-icons { font-size: 20px; }
            .task-body { flex: 1; min-width: 0; }
            .task-title { font-size: 0.86rem; font-weight: 600; color: var(--color-text); margin: 0 0 2px; }
            .task-meta { font-size: 0.74rem; color: var(--color-text-muted); }
            .task-pill {
                display: inline-block;
                font-size: 0.68rem; font-weight: 700;
                padding: 2px 8px; border-radius: 999px;
                text-transform: uppercase; letter-spacing: 0.04em;
                background: var(--color-warning-light); color: #b45309;
                margin-top: 6px;
            }
            .task-pill.high { background: var(--color-error-light); color: #b91c1c; }
            .task-pill.med { background: var(--color-warning-light); color: #b45309; }
            .task-pill.low { background: var(--color-info-light); color: #1d4ed8; }

            .empty-state {
                padding: 32px 16px; text-align: center;
                color: var(--color-text-muted); font-size: 0.86rem;
                background: var(--color-bg); border-radius: 10px;
                border: 1px dashed var(--color-border);
            }

            /* ── Generic dashboard cards & tables (for other views) ── */
            .dashboard-card,
            .customers-search-panel,
            .customers-results-panel {
                background: var(--color-surface) !important;
                border: 1px solid var(--color-border) !important;
                border-top-width: 1px !important;
                border-radius: 14px !important;
                box-shadow: var(--shadow-sm) !important;
            }
            .data-table { background: var(--color-surface); border-radius: 12px; overflow: hidden; border: 1px solid var(--color-border); width: 100%; border-collapse: separate; border-spacing: 0; }
            .data-table thead th {
                background: var(--color-bg);
                font-size: 0.72rem; font-weight: 700;
                text-transform: uppercase; letter-spacing: 0.06em;
                color: var(--color-text-muted);
                padding: 12px 16px;
                border-bottom: 1px solid var(--color-border);
                text-align: left;
            }
            .data-table tbody td {
                padding: 14px 16px;
                font-size: 0.86rem;
                color: var(--color-text);
                border-bottom: 1px solid var(--color-border-light);
            }
            .data-table tbody tr:last-child td { border-bottom: none; }
            .data-table tbody tr:hover { background: var(--color-bg); }

            .btn { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 10px; font-size: 0.85rem; font-weight: 600; border: 1px solid transparent; cursor: pointer; transition: all 150ms ease; }
            .btn-primary { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
            .btn-primary:hover { background: #14305c; border-color: #14305c; }
            .btn-secondary { background: var(--color-surface); color: var(--color-text); border-color: var(--color-border); }
            .btn-secondary:hover { border-color: var(--color-accent); color: var(--color-accent-dark); }
            .btn-accent { background: var(--color-accent); color: #fff; border-color: var(--color-accent); }
            .btn-accent:hover { background: var(--color-accent-dark); border-color: var(--color-accent-dark); }

            .form-input, .form-select, .form-textarea {
                width: 100%;
                padding: 10px 14px;
                border: 1px solid var(--color-border);
                border-radius: 10px;
                background: var(--color-surface);
                color: var(--color-text);
                font-size: 0.88rem;
                font-family: inherit;
                outline: none;
                transition: all 150ms ease;
            }
            .form-input:focus, .form-select:focus, .form-textarea:focus {
                border-color: var(--color-accent);
                box-shadow: 0 0 0 3px var(--color-accent-light);
            }
            .form-label { font-size: 0.78rem; font-weight: 600; color: var(--color-text-secondary); margin-bottom: 6px; display: block; }

            .status-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
            .status-badge.active, .status-badge.approved, .status-badge.success { background: var(--color-success-light); color: #047857; }
            .status-badge.pending, .status-badge.warning { background: var(--color-warning-light); color: #b45309; }
            .status-badge.frozen, .status-badge.suspended, .status-badge.error, .status-badge.rejected { background: var(--color-error-light); color: #b91c1c; }
            .status-badge.closed, .status-badge.inactive { background: var(--color-border-light); color: var(--color-text-secondary); }

            .alert { padding: 12px 16px; border-radius: 10px; font-size: 0.86rem; margin-bottom: 16px; border: 1px solid transparent; }
            .alert-error { background: var(--color-error-light); color: #b91c1c; border-color: #fecaca; }
            .alert-success { background: var(--color-success-light); color: #047857; border-color: #a7f3d0; }

            /* ── Login redesign (keep existing class hooks) ─────────── */
            .login-shell { display: grid; grid-template-columns: 1fr 1fr; min-height: 100vh; padding: 0; max-width: none; }
            .login-hero {
                background: linear-gradient(135deg, #0b2545 0%, #14305c 50%, #0d8c7d 130%);
                color: #fff;
                padding: 64px 56px;
                display: flex; flex-direction: column; justify-content: center; gap: 16px;
                position: relative; overflow: hidden;
            }
            .login-hero::before {
                content: ""; position: absolute;
                right: -80px; top: -80px; width: 320px; height: 320px;
                border-radius: 50%; background: rgba(19, 184, 164, 0.15); filter: blur(20px);
            }
            .login-hero-title { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.02em; max-width: 440px; position: relative; }
            .login-hero-subtitle { font-size: 1.05rem; color: rgba(255, 255, 255, 0.85); max-width: 440px; line-height: 1.6; position: relative; }
            .login-hero-meta { font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--color-accent); font-weight: 700; position: relative; }
            .login-auth { display: flex; align-items: center; justify-content: center; padding: 32px; background: var(--color-bg); }
            .login-card { width: 100%; max-width: 420px; padding: 36px !important; }
            @media (max-width: 880px) {
                .login-shell { grid-template-columns: 1fr; }
                .login-hero { padding: 36px; min-height: 220px; }
                .login-hero-title { font-size: 1.6rem; }
            }

            </style>
    </head>
    <body>
        <div id="root">
            <div id="loading">Loading IronLedger Dashboard...</div>
        </div>

        <script src="wasm_exec.js"></script>
        <script>
            const go = new Go();
            WebAssembly.instantiateStreaming(
                fetch("ironledger.wasm?v=12"),
                go.importObject,
            )
                .then((result) => {
                    go.run(result.instance);
                })
                .catch((err) => {
                    document.getElementById("root").innerHTML =
                        '<div class="alert alert-error">Error loading WebAssembly: ' +
                        err.message +
                        "</div>";
                });
        </script>
    </body>
</html>

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "18081:8081"
    volumes:
      - ironledger_mnesia:/tmp/ironledger_mnesia
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  dashboard:
    build:
      context: .
      dockerfile: apps/cb_dashboard/Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=development
      - PORT=3000
    command: npm run dev
    develop:
      watch:
        - path: ./apps/cb_dashboard/src
          action: sync
          target: /app/src
        - path: ./apps/cb_dashboard/public
          action: sync
          target: /app/public
        - path: ./apps/cb_dashboard/package.json
          action: rebuild
        - path: ./apps/cb_dashboard/next.config.ts
          action: rebuild

volumes:
  ironledger_mnesia:
